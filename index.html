<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Weather</title>
  
  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    :root {
      --bg-dark: #121214;
      --card-gradient: linear-gradient(135deg, #7b8b9a 0%, #5a6a7a 100%);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.8);
      --glass-bg: rgba(28, 28, 30, 0.85);
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Main Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 50px 20px 10px 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 700;
    }
    .icon-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Location List */
    .locations-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .locations-container::-webkit-scrollbar { display: none; }

    .location-card {
      background: var(--card-gradient);
      border-radius: 20px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }
    .location-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.05);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      z-index: 1;
    }
    .card-content {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      width: 100%;
    }
    .card-left { display: flex; flex-direction: column; justify-content: space-between; }
    .card-right { display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; }
    .city-name { font-size: 24px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px;}
    .time { font-size: 13px; font-weight: 500; opacity: 0.9; margin-top: 2px; }
    .warning { font-size: 12px; font-weight: 500; margin-top: 18px; color: #ffcc00; }
    .temp { font-size: 48px; font-weight: 300; margin: -5px 0 0 0; }
    .high-low { font-size: 13px; font-weight: 500; opacity: 0.9; margin-bottom: 2px;}
    
    .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
    }

    /* Search Bar */
    .search-container {
      padding: 15px 20px 35px 20px;
      background: var(--glass-bg);
      -webkit-backdrop-filter: blur(30px);
      backdrop-filter: blur(30px);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-input-wrapper { 
      position: relative; 
      flex: 1;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: rgba(255, 255, 255, 0.6);
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 15px 10px 40px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
    }
    
    .add-btn {
      background: none;
      border: none;
      color: #0a84ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 0;
    }

    /* Settings Overlay */
    .settings-overlay {
      position: fixed;
      top: 100%;
      left: 0; right: 0; bottom: 0;
      background: var(--glass-bg);
      -webkit-backdrop-filter: blur(40px);
      backdrop-filter: blur(40px);
      z-index: 100;
      transition: top 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      flex-direction: column;
      padding: 50px 20px 35px 20px;
    }
    .settings-overlay.active { top: 0; }
    
    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .settings-header h2 { margin: 0; font-size: 28px; }
    
    .settings-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .settings-content h3 { font-size: 14px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 10px;}
    
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 18px;
    }
    input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: #34c759;
    }

    .test-btn {
      margin-top: auto;
      background: rgba(255,255,255,0.1);
      color: #0a84ff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <!-- Main View -->
  <div class="header">
    <h1>Weather</h1>
    <button class="icon-btn" id="openSettings">
      <span class="material-symbols-outlined">settings</span>
    </button>
  </div>

  <div class="locations-container" id="locationsList"></div>

  <div class="search-container">
    <div class="search-input-wrapper">
      <span class="material-symbols-outlined search-icon">search</span>
      <input type="text" id="addLocationInput" list="locations-list" placeholder="Search for a city, country..." autocomplete="off">
      <datalist id="locations-list">
        <option value="Regina, SK, Canada">
        <option value="Saskatoon, SK, Canada">
        <option value="Unity, SK, Canada">
        <option value="Hillsdale No. 440, SK, Canada">
      </datalist>
    </div>
    <button class="add-btn" id="addBtn">
      <span class="material-symbols-outlined" style="font-size: 32px;">add_circle</span>
    </button>
  </div>

  <!-- Settings View -->
  <div class="settings-overlay" id="settingsView">
    <div class="settings-header">
      <h2>Alert Settings</h2>
      <button class="icon-btn" id="closeSettings" style="background: none; color: #0a84ff;">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    
    <div class="settings-content">
      <h3>What notifications do I wanna get?</h3>
      
      <div class="toggle-row">
        <span>Severe Thunderstorms</span>
        <input type="checkbox" id="pref-thunder" checked>
      </div>
      <div class="toggle-row">
        <span>Tornado Warnings</span>
        <input type="checkbox" id="pref-tornado" checked>
      </div>
      <div class="toggle-row">
        <span>Heat Warnings</span>
        <input type="checkbox" id="pref-heat" checked>
      </div>
      <div class="toggle-row">
        <span>EMS / Amber Alerts</span>
        <input type="checkbox" id="pref-ems" checked>
      </div>

      <button class="test-btn" id="pushTestBtn">
        <span class="material-symbols-outlined">notifications</span>
        Test Push API (5s Delay)
      </button>
    </div>
  </div>

  <script>
// 1. Initial State & Load from LocalStorage
let savedPlaces = JSON.parse(localStorage.getItem('weatherPlaces')) || [
  { city: "Regina, SK", time: "12:00 PM", temp: "22°", condition: "Clear", hl: "H:25° L:10°" }
];

const locationsList = document.getElementById('locationsList');
const addLocationInput = document.getElementById('addLocationInput');
const addBtn = document.getElementById('addBtn');

// 2. Render Function
function renderLocations() {
  locationsList.innerHTML = '';
  savedPlaces.forEach((place, index) => {
    locationsList.innerHTML += `
      <div class="location-card">
        <div class="card-content">
          <div class="card-left">
            <div>
              <h2 class="city-name">${place.city}</h2>
              <div class="time">${place.time}</div>
            </div>
            <div class="warning">${place.condition}</div>
          </div>
          <div class="card-right">
            <div class="temp">${place.temp}</div>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="high-low">${place.hl}</div>
              <button class="delete-btn" onclick="removePlace(${index})">
                <span class="material-symbols-outlined">delete</span>
              </button>
            </div>
          </div>
        </div>
      </div>`;
  });
}

// 3. Delete Function
window.removePlace = function(index) {
  savedPlaces.splice(index, 1);
  localStorage.setItem('weatherPlaces', JSON.stringify(savedPlaces));
  renderLocations();
};

// 4. Force Add & Save Function
window.addNewLocation = function() {
  const newLoc = addLocationInput.value.trim(); 
  
  if (newLoc !== '') {
    const newPlace = {
      city: newLoc, 
      time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
      temp: "--°", 
      condition: "Fetching data...",
      hl: "H:--° L:--°"
    };
    
    // Push to array and force save to storage
    savedPlaces.push(newPlace);
    localStorage.setItem('weatherPlaces', JSON.stringify(savedPlaces));
    
    // Update UI and clear input
    renderLocations();
    addLocationInput.value = ''; 
  } else {
    alert("Please enter a valid city name.");
  }
};

// 5. Event Listeners for Adding
addBtn.onclick = addNewLocation;

addLocationInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addNewLocation();
  }
});

// 6. Settings Overlay Logic
const settingsView = document.getElementById('settingsView');
document.getElementById('openSettings').onclick = () => settingsView.classList.add('active');
document.getElementById('closeSettings').onclick = () => settingsView.classList.remove('active');

// Initialize the view
renderLocations();

  </script>
</body>
</html>
